<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.app {
    width: 400px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 20px;
}

/* HEADER */
h1 {
    text-align: center;
}

/* INPUT */
.input-box {
    display: flex;
    gap: 10px;
}

.input-box input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* BUTTONS */
button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.add { background: #38bdf8; }
.undo { background: orange; }
.redo { background: green; }

/* TASK */
.task {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1e293b;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
}

.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

/* ACTIONS */
.actions button {
    margin-left: 5px;
}
</style>
</head>

<body>

<div class="app">
<h1>🧠 TaskFlow Pro</h1>

<div class="input-box">
<input type="text" id="taskInput" placeholder="Enter task...">
<button class="add" onclick="addTask()">Add</button>
</div>

<div style="margin-top:10px;">
<button class="undo" onclick="undo()">Undo</button>
<button class="redo" onclick="redo()">Redo</button>
</div>

<div id="taskList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let undoStack = [];
let redoStack = [];

// SAVE
function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

// RENDER
function render() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
        list.innerHTML += `
        <div class="task ${task.done ? 'completed' : ''}">
            <span onclick="toggleTask(${index})">${task.text}</span>
            <div class="actions">
                <button onclick="deleteTask(${index})">❌</button>
            </div>
        </div>`;
    });

    save();
}

// ADD
function addTask() {
    let input = document.getElementById("taskInput");
    let value = input.value.trim();
    if (!value) return;

    let newTask = { text: value, done: false };
    tasks.push(newTask);

    undoStack.push({ type: "add", task: newTask });
    redoStack = [];

    input.value = "";
    render();
}

// DELETE
function deleteTask(index) {
    let removed = tasks.splice(index, 1)[0];

    undoStack.push({ type: "delete", task: removed, index });
    redoStack = [];

    render();
}

// TOGGLE
function toggleTask(index) {
    tasks[index].done = !tasks[index].done;

    undoStack.push({ type: "toggle", index });
    redoStack = [];

    render();
}

// UNDO
function undo() {
    if (!undoStack.length) return;

    let action = undoStack.pop();

    if (action.type === "add") {
        tasks.pop();
    } 
    else if (action.type === "delete") {
        tasks.splice(action.index, 0, action.task);
    } 
    else if (action.type === "toggle") {
        tasks[action.index].done = !tasks[action.index].done;
    }

    redoStack.push(action);
    render();
}

// REDO
function redo() {
    if (!redoStack.length) return;

    let action = redoStack.pop();

    if (action.type === "add") {
        tasks.push(action.task);
    } 
    else if (action.type === "delete") {
        tasks.splice(action.index, 1);
    } 
    else if (action.type === "toggle") {
        tasks[action.index].done = !tasks[action.index].done;
    }

    undoStack.push(action);
    render();
}

// INIT
render();
</script>

</body>
</html>
