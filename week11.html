<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Collection Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #18181b;
      --surface2: #222226;
      --border: #2e2e34;
      --accent: #f5c842;
      --accent2: #e07b39;
      --text: #f0ede8;
      --muted: #7a7a85;
      --danger: #e05555;
      --success: #4cba7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .title-block h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
    }

    .title-block p {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
    }

    .capacity-display {
      text-align: right;
    }

    .cap-number {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      color: var(--accent);
      line-height: 1;
    }

    .cap-number span {
      font-size: 1rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .cap-bar-wrap {
      width: 140px;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .cap-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      transition: width 0.4s ease, background 0.3s;
    }

    /* ---- Add Form ---- */
    .add-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    .add-section h2 {
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 160px auto;
      gap: 10px;
      align-items: end;
    }

    .form-group label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 5px;
      font-family: 'DM Mono', monospace;
    }

    input, select {
      width: 100%;
      height: 40px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 0 12px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    select option { background: #1e1e22; }

    .btn-add {
      height: 40px;
      padding: 0 20px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.88rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-add:hover { background: #f7d060; }
    .btn-add:active { transform: scale(0.97); }

    /* ---- Search ---- */
    .search-section {
      display: flex;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .search-section input {
      flex: 1;
      background: var(--surface);
      padding-left: 38px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    .btn-clear {
      height: 40px;
      padding: 0 16px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-clear:hover { color: var(--text); border-color: var(--muted); }

    /* ---- Toast ---- */
    #toast {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 9px 14px;
      border-radius: 7px;
      margin-bottom: 1rem;
      display: none;
      border-left: 3px solid;
    }

    #toast.ok   { background: #1a2e22; color: var(--success); border-color: var(--success); }
    #toast.err  { background: #2e1a1a; color: var(--danger);  border-color: var(--danger);  }
    #toast.info { background: #1e1e2c; color: #8cb4f5;        border-color: #8cb4f5;        }

    /* ---- Table ---- */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
    }

    td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr { transition: background 0.12s; }
    tbody tr:hover { background: var(--surface2); }
    tbody tr.match { background: #211e0e; }

    .td-num {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      width: 36px;
    }

    .td-title { font-weight: 500; color: var(--text); }

    .td-author { color: var(--muted); font-size: 0.84rem; }

    .genre-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
      border: 1px solid;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .btn-remove:hover { color: var(--danger); background: #2e1a1a; }

    .empty-row td {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'DM Mono', monospace;
    }

    .result-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    @media (max-width: 620px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .btn-add { grid-column: span 2; }
      header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .capacity-display { text-align: left; }
      .cap-bar-wrap { width: 100%; max-width: 200px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-block">
      <h1>My Library</h1>
      <p>fixed-capacity array · search · add · remove</p>
    </div>
    <div class="capacity-display">
      <div class="cap-number" id="cap-num">0 <span>/ 8</span></div>
      <div class="cap-bar-wrap"><div class="cap-bar" id="cap-bar" style="width:0%"></div></div>
    </div>
  </header>

  <!-- Add Book Form -->
  <div class="add-section">
    <h2>Add a book</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="in-title" placeholder="e.g. Dune" />
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" id="in-author" placeholder="e.g. Frank Herbert" />
      </div>
      <div class="form-group">
        <label>Genre</label>
        <select id="in-genre">
          <option value="">Select genre</option>
          <option>Fiction</option>
          <option>Non-Fiction</option>
          <option>Sci-Fi</option>
          <option>Fantasy</option>
          <option>Mystery</option>
          <option>Biography</option>
          <option>History</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn-add" onclick="addBook()">+ Add</button>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search" placeholder="Search by title…" oninput="renderTable()" />
    </div>
    <button class="btn-clear" onclick="clearSearch()">Clear</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Result count -->
  <div class="result-count" id="result-count"></div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Title</th>
          <th>Author</th>
          <th>Genre</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>
  // ─── Data ───────────────────────────────────────────────────────────────────
  const CAPACITY = 8;

  // Fixed-size array representation: array pre-allocated, null = empty slot
  const books = new Array(CAPACITY).fill(null);

  let nextId = 1;

  // Pre-load 3 sample books
  const samples = [
    { title: "The Pragmatic Programmer", author: "Hunt & Thomas", genre: "Non-Fiction" },
    { title: "Dune",                     author: "Frank Herbert",  genre: "Sci-Fi"     },
    { title: "Clean Code",               author: "Robert C. Martin", genre: "Non-Fiction" },
  ];
  samples.forEach(s => insertBook(s.title, s.author, s.genre));

  // ─── Core Array Operations ──────────────────────────────────────────────────

  // Find first empty slot → O(n)
  function findEmptySlot() {
    for (let i = 0; i < CAPACITY; i++) {
      if (books[i] === null) return i;
    }
    return -1; // full
  }

  // Count filled slots
  function countBooks() {
    return books.filter(b => b !== null).length;
  }

  // Insert a book into the first empty slot
  function insertBook(title, author, genre) {
    const slot = findEmptySlot();
    if (slot === -1) return false;
    books[slot] = { id: nextId++, title, author, genre };
    return true;
  }

  // Remove a book by id → find and nullify slot
  function deleteBook(id) {
    for (let i = 0; i < CAPACITY; i++) {
      if (books[i] && books[i].id === id) {
        books[i] = null;
        return true;
      }
    }
    return false;
  }

  // Linear search by title (case-insensitive substring)
  function searchByTitle(query) {
    const q = query.toLowerCase();
    return books.filter(b => b !== null && b.title.toLowerCase().includes(q));
  }

  // ─── Genre Styling ───────────────────────────────────────────────────────────
  const GENRE_STYLE = {
    'Fiction':     { color: '#6ab0f5', bg: 'transparent', border: '#6ab0f5' },
    'Non-Fiction': { color: '#4cba7a', bg: 'transparent', border: '#4cba7a' },
    'Sci-Fi':      { color: '#a78bfa', bg: 'transparent', border: '#a78bfa' },
    'Fantasy':     { color: '#f472b6', bg: 'transparent', border: '#f472b6' },
    'Mystery':     { color: '#fbbf24', bg: 'transparent', border: '#fbbf24' },
    'Biography':   { color: '#34d399', bg: 'transparent', border: '#34d399' },
    'History':     { color: '#fb923c', bg: 'transparent', border: '#fb923c' },
    'Other':       { color: '#94a3b8', bg: 'transparent', border: '#94a3b8' },
    '':            { color: '#94a3b8', bg: 'transparent', border: '#94a3b8' },
  };

  // ─── UI Helpers ─────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.style.display = 'none', 3000);
  }

  function updateCapBar() {
    const n = countBooks();
    const pct = (n / CAPACITY) * 100;
    document.getElementById('cap-num').innerHTML = `${n} <span>/ ${CAPACITY}</span>`;
    const bar = document.getElementById('cap-bar');
    bar.style.width = pct + '%';
    bar.style.background = pct === 100 ? '#e05555' : pct >= 75 ? '#e07b39' : '#f5c842';
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderTable() {
    const query = document.getElementById('search').value.trim();
    const list = query ? searchByTitle(query) : books.filter(b => b !== null);
    const tbody = document.getElementById('tbody');
    const rc = document.getElementById('result-count');

    if (query) {
      rc.textContent = `${list.length} result${list.length !== 1 ? 's' : ''} for "${query}"`;
    } else {
      const n = countBooks();
      rc.textContent = n === 0 ? 'No books yet.' : `${n} book${n !== 1 ? 's' : ''} in collection`;
    }

    tbody.innerHTML = '';

    if (list.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="5">${query ? 'No books match your search.' : 'Collection is empty. Add a book above.'}</td></tr>`;
      return;
    }

    list.forEach((b, i) => {
      const gs = GENRE_STYLE[b.genre] || GENRE_STYLE[''];
      const tr = document.createElement('tr');
      if (query) tr.classList.add('match');
      tr.innerHTML = `
        <td class="td-num">${i + 1}</td>
        <td class="td-title">${esc(b.title)}</td>
        <td class="td-author">${esc(b.author)}</td>
        <td>
          <span class="genre-badge" style="color:${gs.color};border-color:${gs.border}">
            ${esc(b.genre || '—')}
          </span>
        </td>
        <td>
          <button class="btn-remove" title="Remove" onclick="removeBook(${b.id}, '${esc(b.title)}')">&#10005;</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  // ─── Public Actions ──────────────────────────────────────────────────────────
  function addBook() {
    const title  = document.getElementById('in-title').value.trim();
    const author = document.getElementById('in-author').value.trim();
    const genre  = document.getElementById('in-genre').value;

    if (!title)  { showToast('Title is required.', 'err'); return; }
    if (!author) { showToast('Author is required.', 'err'); return; }

    // Duplicate check (linear search)
    const dup = books.find(b => b !== null && b.title.toLowerCase() === title.toLowerCase());
    if (dup) { showToast(`"${title}" already exists in the collection.`, 'err'); return; }

    // Capacity check
    if (countBooks() >= CAPACITY) {
      showToast(`Collection is full (max ${CAPACITY} books). Remove one first.`, 'err');
      return;
    }

    insertBook(title, author, genre);
    document.getElementById('in-title').value  = '';
    document.getElementById('in-author').value = '';
    document.getElementById('in-genre').value  = '';

    updateCapBar();
    renderTable();
    showToast(`"${title}" added successfully.`, 'ok');
  }

  function removeBook(id, title) {
    deleteBook(id);
    updateCapBar();
    renderTable();
    showToast(`"${title}" removed from the collection.`, 'info');
  }

  function clearSearch() {
    document.getElementById('search').value = '';
    renderTable();
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' &&
        ['in-title','in-author','in-genre'].includes(document.activeElement.id)) {
      addBook();
    }
  });

  // Init
  updateCapBar();
  renderTable();
</script>
</body>
</html>
